name: Bug Report
description: File a bug report to help us improve WanderPlan
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P0 — App is unusable / crash
        - P1 — Major feature is broken
        - P2 — Degraded experience / workaround exists
        - P3 — Minor visual / polish issue
    validations:
      required: true

  - type: dropdown
    id: epic
    attributes:
      label: Affected Epic
      options:
        - Epic 1 — Onboarding Wizard
        - Epic 2 — Itinerary Engine
        - Epic 3 — Comparison Engine
        - Epic 4 — Best Time to Travel
        - Epic 5 — Ancillary Dashboard
        - PDF Export
        - Infrastructure / Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & Version
      placeholder: e.g. Chrome 125, Safari 17, Firefox 126
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. macOS 14.5, Windows 11
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Screen Recording
      description: Drag and drop images or paste a Loom link
