name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend ───────────────────────────────────────────────────────────
  backend-lint-and-test:
    name: Backend — Lint, Type-check & Test
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (Ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy . --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          QDRANT_URL: http://localhost:6333
          LLM_PROVIDER: mock
          GROQ_API_KEY: test-key-ci
          ALLOWED_ORIGINS: http://localhost:3000

  # ─── Frontend ──────────────────────────────────────────────────────────
  frontend-lint-and-test:
    name: Frontend — Lint, Type-check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Unit & component tests (Vitest)
        run: npm run test -- --run

  # ─── E2E (runs on merge to main only) ──────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [backend-lint-and-test, frontend-lint-and-test]
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: apps/api

      - name: Start backend
        run: uvicorn main:app --host 0.0.0.0 --port 8000 &
        working-directory: apps/api
        env:
          QDRANT_URL: http://localhost:6333
          LLM_PROVIDER: mock
          GROQ_API_KEY: test-key-ci
          ALLOWED_ORIGINS: http://localhost:3000

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Build Next.js
        run: npm run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Start frontend
        run: npm run start &
        working-directory: apps/web

      - name: Wait for services
        run: npx wait-on http://localhost:3000 http://localhost:8000/health --timeout 30000
        working-directory: apps/web

      - name: Run Playwright E2E tests
        run: npx playwright test
        working-directory: apps/web
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
