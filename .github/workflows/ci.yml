name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── High-scrutiny file changes ────────────────────────────────────────
  # See docs/scaling-tech-challenges.md, Security Vulnerabilities #10:
  # AGENTS.md/CLAUDE.md instruct AI coding agents to consult specific repo
  # paths — a compromised dependency or malicious PR could plant similar
  # "agent instructions" that get silently obeyed. Flag any PR touching
  # these files for mandatory human (not AI-agent) review.
  agent-instructions-changed:
    name: Flag AGENTS.md / CLAUDE.md changes for review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for AGENTS.md / CLAUDE.md changes
        run: |
          changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '**/AGENTS.md' '**/CLAUDE.md')
          if [ -n "$changed" ]; then
            echo "::warning::This PR modifies AI-agent instruction file(s): $changed — requires a second human reviewer per repo policy (see .github/CODEOWNERS). Do not let an AI agent auto-approve these changes."
          fi

  # ─── Backend ───────────────────────────────────────────────────────────
  backend-lint-and-test:
    name: Backend — Lint, Type-check & Test
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (Ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy . --ignore-missing-imports

      - name: Fail on wildcard ALLOWED_ORIGINS
        working-directory: ${{ github.workspace }}
        run: |
          if grep -RInE 'ALLOWED_ORIGINS\s*=\s*"?\*' --include='*.env*' --include='*.yml' --include='*.yaml' --include='*.toml' . 2>/dev/null | grep -v '\.example'; then
            echo "::error::ALLOWED_ORIGINS must not contain a wildcard ('*') in any committed env/deploy config."
            exit 1
          fi

      - name: Audit dependencies for known vulnerabilities (pip-audit)
        # Advisory only for now: this surfaced pre-existing transitive CVEs
        # (starlette/python-multipart pulled in by the pinned fastapi/uvicorn
        # versions) that need a dedicated upgrade effort, not a silent CI
        # block. Flip to blocking once those are remediated.
        run: pip-audit -r requirements.txt || echo "::warning::pip-audit found known vulnerabilities — see job log. Non-blocking until existing findings are remediated."

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          QDRANT_URL: http://localhost:6333
          LLM_PROVIDER: mock
          GROQ_API_KEY: test-key-ci
          ALLOWED_ORIGINS: http://localhost:3000

  # ─── Frontend ──────────────────────────────────────────────────────────
  frontend-lint-and-test:
    name: Frontend — Lint, Type-check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Unit & component tests (Vitest)
        run: npm run test -- --run

  # ─── E2E (runs on merge to main only) ──────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [backend-lint-and-test, frontend-lint-and-test]
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: apps/api

      - name: Start backend
        run: uvicorn main:app --host 0.0.0.0 --port 8000 &
        working-directory: apps/api
        env:
          QDRANT_URL: http://localhost:6333
          LLM_PROVIDER: mock
          GROQ_API_KEY: test-key-ci
          ALLOWED_ORIGINS: http://localhost:3000

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Build Next.js
        run: npm run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Start frontend
        run: npm run start &
        working-directory: apps/web

      - name: Wait for services
        run: npx wait-on http://localhost:3000 http://localhost:8000/health --timeout 30000
        working-directory: apps/web

      - name: Run Playwright E2E tests
        run: npx playwright test
        working-directory: apps/web
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
